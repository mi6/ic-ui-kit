name: "\U0001F4A1 Suggest a new feature for an existing component"
description: "Suggest a UI Kit component or design pattern."
type: "Feature"
body:
  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "Tell us, in a few words, what the new feature would do."
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "💬 Description"
      description: "A full description of what the feature should be and how it should work."
    validations:
      required: true
  - type: textarea
    id: user-value
    attributes:
      label: "💰 User value"
      description: "Describe why this is important and how it will help users (either developers, designers or the end-users). Think about how it makes people's lives easier, more accessible or quicker to build stuff."
    validations:
      required: true
  - type: textarea
    id: user-stories
    attributes:
      label: "📚 User Stories"
      description: |
        If relevant, describe the high-level functionality as user stories.
        _As an_ ICDS user:
        _I need_
        _So that_
    validations:
      required: false
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "📝 Acceptance Criteria"
      description: |
        If relevant, describe in full detail the different interactions and edge cases that the component or patterns needs to fulfil.
        _Given_
        _When_
        _Then_
    validations:
      required: false
  - type: textarea
    id: designs
    attributes:
      label: "✏ Designs"
      description: "If there's a Figma design file (or other mock-up), include it here."
    validations:
      required: false
  - type: textarea
    id: guidance
    attributes:
      label: "🧾 Guidance"
      description: "If there's written guidance or documentation, include a link to it here."
    validations:
      required: false
  - type: dropdown
    id: urgency-low-medium-or-high
    attributes:
      label: "🚨 Urgency (low, medium or high)"
      description: |
        How urgent is this issue?
        - Low = Does not have significant impact and can be addressed at a convenient time without causing delays.
        - Medium = Has moderate impact and should be addressed soon to avoid potential delays or complications.
        - High = A critical issue which has significant impact and needs immediate attention to prevent major delays or blockers.
      options:
        - Low
        - Medium
        - High
    validations:
      required: false
  - type: textarea
    id: additional-info
    attributes:
      label: "Additional info"
      description: Tell us anything else useful to help us understand your suggestion.
    validations:
      required: false
